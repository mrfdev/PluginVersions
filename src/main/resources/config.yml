# PluginVersions configuration
#
# Language phrases are stored in translations/Locale_EN.yml. Keep command text,
# colors, placeholders, and other player-facing wording there so translations
# stay separate from operational settings.

# Check for updates.
# Disabled by default so no update checks run unless you opt in.
check-for-updates: false

settings:
  # Anonymous bStats metrics are disabled by default.
  # Set this to true only when you explicitly want PluginVersions to report
  # anonymous usage statistics. Global bStats settings may still override this.
  enable-metrics: false

  # Locale file suffix loaded from the translations folder.
  # Example: EN loads translations/Locale_EN.yml.
  locale: "EN"

  # Number of rows shown on paged command output, including /pv list <page>,
  # /pv config <page>, /pv help <page>, and /pv debug <page>.
  lines-per-page: 10

database:
  # YAML database file used to build a long-lived plugin inventory.
  # Relative paths are stored inside plugins/1MB-PluginVersions/.
  file: "plugins-database.yml"

  # Scan loaded plugins and update the database when PluginVersions starts.
  update-on-enable: true

  # Scan loaded plugins and update the database whenever /pv list is used.
  update-on-list: true

  # Maximum number of scan history entries retained per tracked plugin.
  max-history-per-plugin: 25

exports:
  # Folder for timestamped Markdown and Discord-friendly exports created by
  # /pv export markdown and /pv export discord. Each export also updates a
  # stable latest file for easy GitHub or Discord automation.
  # Relative paths are stored inside plugins/1MB-PluginVersions/.
  directory: "exports"
